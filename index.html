<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مزن - أثر يروي عطاءكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050b1a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .drop { position: absolute; background: rgba(0, 183, 255, 0.15); border-radius: 50% 0 50% 50%; transform: rotate(-45deg); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: rotate(-45deg) translateY(0); } 50% { transform: rotate(-45deg) translateY(-20px); } }
    </style>
</head>
<body class="min-h-screen relative">

    <div id="drops" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="container mx-auto px-4 py-8 relative z-10 max-w-2xl">
        
        <header class="text-center mb-12">
            <div class="flex justify-center mb-4">
                <img src="https://muzn-sa.vercel.app/logo.png" alt="لوجو مزن" class="h-20 w-auto object-contain drop-shadow-2xl">
            </div>
            <h1 class="text-4xl font-extrabold text-blue-400 mb-2">مُزن</h1>
            <p class="text-blue-200 opacity-80">أثرٌ يروي بعطائكم</p>
        </header>

        <main class="glass rounded-3xl p-8 shadow-2xl">
            
            <div id="driverForm" class="hidden space-y-6">
                <div class="text-center">
                    <span class="bg-blue-500/20 text-blue-400 px-4 py-1 rounded-full text-sm font-bold">🚛 توثيق التوصيل</span>
                    <h2 class="text-2xl font-bold mt-4 mb-2">نُوثّق كل توصيلة</h2>
                    <p class="text-blue-200/60 mb-6">صور حقيقية من الميدان</p>
                </div>

                <div class="space-y-4">
                    <div class="text-right">
                        <label class="block text-blue-200 text-sm mb-2 mr-2">اسم المورد / جهة التوريد</label>
                        <input type="text" id="driverNameInput" placeholder="أدخل اسم المورد هنا..." 
                               class="w-full bg-white/5 border border-blue-400/20 rounded-2xl px-5 py-4 text-white text-right focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all">
                    </div>

                    <div class="text-right">
                        <label class="block text-blue-200 text-sm mb-2 mr-2">ملاحظات التوصيل (اختياري)</label>
                        <textarea id="driverNotes" rows="3" placeholder="مثال: تم التوصيل لمسجد..." 
                                  class="w-full bg-white/5 border border-blue-400/20 rounded-2xl px-5 py-4 text-white text-right focus:outline-none focus:border-blue-400 transition-all"></textarea>
                    </div>

                    <div class="relative group">
                        <input type="file" id="photoInput" accept="image/*" class="hidden">
                        <label for="photoInput" class="flex flex-col items-center justify-center w-full h-56 border-2 border-dashed border-blue-400/30 rounded-2xl cursor-pointer hover:bg-blue-400/5 transition-all">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center">
                                <span class="text-4xl mb-3">📸</span>
                                <p class="text-blue-200 font-medium">اضغط لرفع صورة التوثيق</p>
                                <p class="text-blue-200/40 text-xs mt-1">(إجباري)</p>
                            </div>
                        </label>
                    </div>
                    <div id="imagePreview" class="hidden mt-4 rounded-2xl overflow-hidden border-2 border-blue-500/20 shadow-xl"></div>
                </div>

                <button onclick="submitDelivery()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-3 mt-8">
                    <span>🚀 إرسال التوثيق للموقع</span>
                </button>
            </div>

            <div id="customerForm" class="hidden space-y-6">
                </div>

            <div id="loading" class="py-20 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-400 mx-auto mb-4"></div>
                <p class="text-blue-200 animate-pulse">جاري فحص الطلب...</p>
            </div>

        </main>
        
        <section id="gallerySection" class="mt-12 space-y-6">
            <h3 class="text-xl font-bold text-center text-blue-400">آخر التوثيقات الميدانية</h3>
            <div id="gallery" class="grid grid-cols-1 gap-6">
                </div>
        </section>

    </div>

    <script>
        // 1. رابط الـ Web App الخاص بك (محدث)
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwR8Dr7kWrerTRIOSXekvRcMTZV9PGDmrkqLD_TjKB8CNVGB-IFGTal7eNJm2VB6isO/exec';
        
        let orderId = new URLSearchParams(window.location.search).get('id');

        // 2. دالة تحويل رابط درايف لرابط مباشر (لحل مشكلة عدم ظهور الصور)
        function getDirectLink(url) {
            if (!url) return '';
            if (url.includes('drive.google.com')) {
                const id = url.match(/[-\w]{25,}/);
                return id ? `https://drive.google.com/uc?export=view&id=${id[0]}` : url;
            }
            return url;
        }

        // تشغيل النظام عند فتح الصفحة
        window.onload = async () => {
            initDrops();
            if (!orderId) {
                document.getElementById('loading').innerHTML = "⚠️ عذراً، لا يوجد رقم طلب.";
                return;
            }
            checkOrder();
            loadGallery();
        };

        async function checkOrder() {
            try {
                const res = await fetch(`${GAS_URL}?action=checkOrder&id=${orderId}`);
                const data = await res.json();
                document.getElementById('loading').classList.add('hidden');
                
                if (data.type === 'Driver') {
                    document.getElementById('driverForm').classList.remove('hidden');
                } else {
                    document.getElementById('customerForm').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function submitDelivery() {
            const fileInput = document.getElementById('photoInput');
            const supplier = document.getElementById('driverNameInput').value;
            const notes = document.getElementById('driverNotes').value;
            const btn = document.getElementById('submitBtn');

            if (!supplier) { alert('لطفاً أدخل اسم المورد'); return; }
            if (fileInput.files.length === 0) { alert('لطفاً ارفع صورة التوثيق'); return; }

            btn.disabled = true;
            btn.innerHTML = '💧 جاري الرفع والتوثيق...';

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result.split(',')[1];
                const fd = new FormData();
                fd.append('action', 'submitDelivery');
                fd.append('orderId', orderId);
                fd.append('image', base64);
                fd.append('driverName', supplier);
                fd.append('notes', notes);

                try {
                    const response = await fetch(GAS_URL, { method: 'POST', body: fd });
                    const result = await response.json();
                    if (result.status === 'success') {
                        alert('تم التوثيق بنجاح! شكراً لك');
                        location.reload();
                    }
                } catch (err) {
                    alert('حدث خطأ، حاول مرة أخرى');
                    btn.disabled = false;
                    btn.innerHTML = '🚀 إرسال التوثيق';
                }
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            try {
                const res = await fetch(`${GAS_URL}?action=getResults`);
                const items = await res.json();
                
                gallery.innerHTML = items.map(item => `
                    <div class="glass rounded-2xl overflow-hidden shadow-lg border border-blue-500/10">
                        <img src="${getDirectLink(item.imageUrl)}" class="w-full h-64 object-cover" onerror="this.src='https://placehold.co/600x400?text=جاري+تحميل+الصورة'">
                        <div class="p-4 text-right">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs text-blue-400 font-bold bg-blue-400/10 px-2 py-1 rounded-lg">${item.orderId}#</span>
                                <span class="text-sm font-bold text-white">${item.name || 'مورد مزن'}</span>
                            </div>
                            <p class="text-sm text-blue-200/70">${item.comment || ''}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("خطأ في تحميل المعرض:", e);
            }
        }

        function initDrops() {
            const container = document.getElementById('drops');
            for(let i=0; i<15; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.top = Math.random() * 100 + '%';
                drop.style.width = drop.style.height = (Math.random() * 15 + 5) + 'px';
                drop.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(drop);
            }
        }

        // معاينة الصورة قبل الرفع
        document.getElementById('photoInput').onchange = e => {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}" class="w-full h-auto">`;
            preview.classList.remove('hidden');
        };
    </script>
</body>
</html>
