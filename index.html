<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُزن - أثر يروي عطاءكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050b1a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .drop { position: absolute; background: rgba(0, 183, 255, 0.15); border-radius: 50% 0 50% 50%; transform: rotate(-45deg); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: rotate(-45deg) translateY(0); } 50% { transform: rotate(-45deg) translateY(-20px); } }
    </style>
</head>
<body class="min-h-screen relative">

    <div id="drops" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="container mx-auto px-4 py-8 relative z-10 max-w-2xl">
        
        <header class="text-center mb-12">
            <div class="flex justify-center mb-4">
                <img src="https://muzn-sa.vercel.app/logo.png" alt="لوجو مزن" id="mainLogo" class="h-24 w-auto object-contain">
            </div>
            <h1 class="text-4xl font-extrabold text-blue-400">مُزن</h1>
            <p class="text-blue-200 opacity-80 mt-2">أثرٌ يروي بعطائكم</p>
        </header>

        <main class="glass rounded-3xl p-8 shadow-2xl transition-all">
            
            <div id="loading" class="py-10 text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-400 mx-auto mb-4"></div>
                <p class="text-blue-200">جاري التحقق...</p>
            </div>

            <div id="driverForm" class="hidden space-y-6">
                <div class="text-center mb-6">
                    <span class="bg-blue-500/20 text-blue-400 px-4 py-1 rounded-full text-xs font-bold">🚛 توثيق التوصيل</span>
                    <h2 class="text-2xl font-bold mt-4">توثيق ميداني</h2>
                </div>

                <div class="space-y-4">
                    <div class="text-right">
                        <label class="block text-blue-200 text-sm mb-2 mr-1 text-right">اسم المورد / جهة التوريد</label>
                        <input type="text" id="driverNameInput" placeholder="اكتب اسم المورد هنا..." class="w-full bg-white/5 border border-blue-400/20 rounded-2xl px-5 py-4 text-white text-right focus:border-blue-400 outline-none">
                    </div>
                    <div class="text-right">
                        <label class="block text-blue-200 text-sm mb-2 mr-1 text-right">ملاحظات</label>
                        <textarea id="driverNotes" rows="2" class="w-full bg-white/5 border border-blue-400/20 rounded-2xl px-5 py-4 text-white text-right outline-none"></textarea>
                    </div>
                    <div class="relative group">
                        <input type="file" id="photoInput" accept="image/*" class="hidden">
                        <label for="photoInput" class="flex flex-col items-center justify-center w-full h-44 border-2 border-dashed border-blue-400/30 rounded-2xl cursor-pointer hover:bg-blue-400/5 transition-all">
                            <span class="text-3xl mb-2">📸</span>
                            <p class="text-blue-200 text-sm">ارفع صورة التوثيق</p>
                        </label>
                    </div>
                    <div id="imagePreview" class="hidden mt-4 rounded-2xl overflow-hidden border border-blue-500/20 shadow-xl"></div>
                </div>
                <button onclick="submitDelivery()" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all mt-6">إرسال التوثيق</button>
            </div>

            <div id="customerForm" class="hidden space-y-6 text-center">
                <span class="bg-yellow-500/20 text-yellow-400 px-4 py-1 rounded-full text-xs font-bold">⭐ تقييم العميل</span>
                <h2 class="text-2xl font-bold mt-4">رأيك يهمنا</h2>
                <div class="flex justify-center gap-2 py-4" id="starRating">
                    </div>
                <textarea id="customerComment" placeholder="اكتب ملاحظاتك هنا..." class="w-full bg-white/5 border border-blue-400/20 rounded-2xl px-5 py-4 text-white text-right outline-none"></textarea>
                <button onclick="submitReview()" id="reviewBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all mt-4 text-right px-4">إرسال التقييم</button>
            </div>
        </main>

        <section class="mt-12">
            <h3 class="text-xl font-bold text-center text-blue-400 mb-6">آخر التوثيقات الميدانية</h3>
            <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

    </div>

    <script>
        // الرابط الخاص بك
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwR8Dr7kWrerTRIOSXekvRcMTZV9PGDmrkqLD_TjKB8CNVGB-IFGTal7eNJm2VB6isO/exec';
        const orderId = new URLSearchParams(window.location.search).get('id');
        let selectedStars = 0;

        function getDirectLink(url) {
            if (!url) return '';
            const id = url.match(/[-\w]{25,}/);
            return id ? `https://drive.google.com/uc?export=view&id=${id[0]}` : url;
        }

        window.onload = () => {
            initDrops();
            if (!orderId) {
                document.getElementById('loading').innerHTML = "⚠️ لا يوجد رقم طلب في الرابط";
                return;
            }
            checkOrder();
            loadGallery();
            setupStars();
        };

        async function checkOrder() {
            try {
                const res = await fetch(`${GAS_URL}?action=checkOrder&id=${orderId}`);
                const data = await res.json();
                document.getElementById('loading').classList.add('hidden');
                if (data.type === 'Driver') {
                    document.getElementById('driverForm').classList.remove('hidden');
                } else {
                    document.getElementById('customerForm').classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('loading').innerHTML = "حدث خطأ في الاتصال";
            }
        }

        async function submitDelivery() {
            const fileInput = document.getElementById('photoInput');
            const supplier = document.getElementById('driverNameInput').value;
            const notes = document.getElementById('driverNotes').value;
            const btn = document.getElementById('submitBtn');

            if (!supplier) { alert('أدخل اسم المورد'); return; }
            if (fileInput.files.length === 0) { alert('ارفع الصورة'); return; }

            btn.disabled = true; btn.innerText = 'جاري الرفع...';
            const reader = new FileReader();
            reader.onload = async (e) => {
                const fd = new FormData();
                fd.append('action', 'submitDelivery');
                fd.append('orderId', orderId);
                fd.append('image', e.target.result.split(',')[1]);
                fd.append('driverName', supplier);
                fd.append('notes', notes);
                await fetch(GAS_URL, { method: 'POST', body: fd });
                alert('تم التوثيق بنجاح'); location.reload();
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        async function submitReview() {
            if (selectedStars === 0) { alert('لطفاً اختر التقييم بالنجوم'); return; }
            const btn = document.getElementById('reviewBtn');
            btn.disabled = true; btn.innerText = 'جاري الإرسال...';
            const fd = new FormData();
            fd.append('action', 'submitReview');
            fd.append('orderId', orderId);
            fd.append('rating', selectedStars);
            fd.append('comment', document.getElementById('customerComment').value);
            await fetch(GAS_URL, { method: 'POST', body: fd });
            alert('شكراً لتقييمك'); location.reload();
        }

        async function loadGallery() {
            const res = await fetch(`${GAS_URL}?action=getResults`);
            const items = await res.json();
            document.getElementById('gallery').innerHTML = items.map(item => `
                <div class="glass rounded-2xl overflow-hidden border border-blue-500/10">
                    <img src="${getDirectLink(item.imageUrl)}" class="w-full h-48 object-cover">
                    <div class="p-4 text-right text-sm">
                        <div class="flex justify-between mb-2"><span class="text-blue-400">#${item.orderId}</span><span class="font-bold">${item.name}</span></div>
                        <p class="opacity-70">${item.comment || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function setupStars() {
            const container = document.getElementById('starRating');
            for(let i=1; i<=5; i++) {
                const s = document.createElement('span');
                s.innerHTML = '☆'; s.className = 'text-3xl cursor-pointer text-yellow-400';
                s.onclick = () => {
                    selectedStars = i;
                    Array.from(container.children).forEach((star, idx) => {
                        star.innerHTML = idx < i ? '★' : '☆';
                    });
                };
                container.appendChild(s);
            }
        }

        function initDrops() {
            const container = document.getElementById('drops');
            for(let i=0; i<15; i++) {
                const d = document.createElement('div'); d.className = 'drop';
                d.style.left = Math.random()*100+'%'; d.style.top = Math.random()*100+'%';
                d.style.width = d.style.height = (Math.random()*10+5)+'px'; container.appendChild(d);
            }
        }

        document.getElementById('photoInput').onchange = e => {
            const p = document.getElementById('imagePreview');
            p.innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}" class="w-full">`;
            p.classList.remove('hidden');
        };
    </script>
</body>
</html>
