<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مزن · سقيا الماء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #04102a;
  --royal:     #1a3fa8;
  --royal-mid: #1e56d0;
  --royal-hi:  #2a6ae8;
  --sky:       #3a8ce8;
  --sky-lt:    #6abcff;
  --aqua:      #00b8f0;
  --aqua-lt:   #5adaff;
  --glass:     rgba(255,255,255,.07);
  --glass-b:   rgba(255,255,255,.12);
  --success:   #00e87a;
  --warn:      #ffc44d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Tajawal',sans-serif;background:var(--ink);color:#fff;direction:rtl;min-height:100vh;overflow-x:hidden;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 10% 20%,rgba(26,63,168,.4) 0%,transparent 52%),
             radial-gradient(ellipse at 90% 80%,rgba(0,184,240,.1) 0%,transparent 48%),var(--ink);}
.drops{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.drop{position:absolute;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  background:linear-gradient(135deg,rgba(58,140,232,.1),rgba(0,184,240,.04));
  border:1px solid rgba(58,140,232,.07);animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(110vh) scale(.7);opacity:0}10%{opacity:1}90%{opacity:.4}100%{transform:translateY(-10vh) scale(1.1);opacity:0}}

.wrap{max-width:1080px;margin:0 auto;padding:0 20px;position:relative;z-index:1;}

/* HEADER */
header{position:sticky;top:0;z-index:200;backdrop-filter:blur(22px);
  background:rgba(4,16,42,.9);border-bottom:1px solid rgba(58,140,232,.14);padding:11px 0;}
.hdr{display:flex;align-items:center;justify-content:space-between;max-width:1080px;margin:0 auto;padding:0 20px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-name{font-size:22px;font-weight:900;background:linear-gradient(135deg,#fff 20%,var(--aqua-lt));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* HERO */
.hero{padding:65px 0 50px;text-align:center;position:relative;z-index:1;}
.hero h1{font-size:clamp(30px,6vw,60px);font-weight:900;line-height:1.15;margin-bottom:14px;}
.hero h1 span{background:linear-gradient(135deg,var(--sky),var(--aqua-lt));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}

/* STATS */
.stats{padding:0 0 60px;position:relative;z-index:1;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}
.scard{background:var(--glass);border:1px solid var(--glass-b);border-radius:20px;padding:26px 14px;text-align:center;backdrop-filter:blur(10px);}
.scard .num{font-size:36px;font-weight:900;background:linear-gradient(135deg,#fff,var(--aqua-lt));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* MOSQUE CARDS */
.mosques{padding:60px 0;position:relative;z-index:1;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.mcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:20px;}

/* GALLERY */
.gallery{padding:60px 0;position:relative;z-index:1;}
.ggrid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:185px 185px;gap:10px;min-height:380px;}
.gi{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;background:var(--royal);}
.gi:first-child{grid-column:span 2;grid-row:span 2;}
.gi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.gi:hover img{transform:scale(1.05);}

/* REVIEWS */
.reviews{padding:60px 0;position:relative;z-index:1;}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.rcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:20px;}

/* FORM SECTION */
.formsec{padding:60px 0 80px;position:relative;z-index:1;}
.fcard{background:linear-gradient(135deg,rgba(26,63,168,.2),rgba(0,184,240,.05));border:1px solid rgba(58,140,232,.18);border-radius:24px;padding:40px 36px;max-width:620px;margin:0 auto;backdrop-filter:blur(12px);}

/* FADE IN */
.fi{opacity:0;transform:translateY(24px);transition:opacity .7s,transform .7s;}
.fi.vis{opacity:1;transform:translateY(0);}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:5px;display:none;}
.toast.show{display:block;}

#preview { max-width: 100%; display: none; margin-top: 10px; border-radius: 10px; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="drops" id="dropsLayer"></div>

<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-name">مزن</div>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="hero">
    <h1>سقيا الماء في <span>بيوت الله</span></h1>
    <p>توثيق ميداني وشفافية كاملة لكل قطرة ماء تصل للمساجد.</p>
  </section>

  <section class="stats">
    <div class="sgrid">
      <div class="scard"><div class="num" id="sMosques">0</div><div class="lbl">مسجد</div></div>
      <div class="scard"><div class="num" id="sBoxes">0</div><div class="lbl">كرتون</div></div>
      <div class="scard"><div class="num" id="sBottles">0</div><div class="lbl">عبوة</div></div>
      <div class="scard"><div class="num" id="sRating">0</div><div class="lbl">تقييم</div></div>
    </div>
  </section>

  <section class="mosques">
    <div class="mgrid" id="mosqueGrid"></div>
  </section>

  <section class="gallery">
    <div class="ggrid" id="galleryGrid">
       <!-- الصور ستظهر هنا -->
    </div>
  </section>

  <section class="reviews">
    <div class="rgrid" id="reviewsGrid"></div>
  </section>

  <section class="formsec" id="formSection">
    <h2 id="formTitle" style="text-align:center; margin-bottom:20px;"></h2>
    
    <div id="driverForm" style="display:none" class="fcard">
       <input type="text" id="dName" placeholder="اسم المندوب" class="fi-inp" style="width:100%; margin-bottom:10px; padding:10px;">
       <textarea id="dNote" placeholder="ملاحظات" class="fi-ta" style="width:100%; margin-bottom:10px; padding:10px;"></textarea>
       <input type="file" id="imgFile" accept="image/*" onchange="compressImage(this)">
       <img id="preview" alt="معاينة">
       <div id="cstat"></div>
       <button onclick="submitDriver()" id="dBtn" style="width:100%; padding:15px; margin-top:10px; background:var(--royal); border:none; color:#fff; border-radius:10px; cursor:pointer;">إرسال التوثيق</button>
    </div>

    <div id="customerForm" style="display:none" class="fcard">
       <input type="text" id="cName" placeholder="اسمك" class="fi-inp" style="width:100%; margin-bottom:10px; padding:10px;">
       <input type="number" id="cRating" min="1" max="5" placeholder="التقييم (1-5)" class="fi-inp" style="width:100%; margin-bottom:10px; padding:10px;">
       <textarea id="cComment" placeholder="تعليقك" class="fi-ta" style="width:100%; margin-bottom:10px; padding:10px;"></textarea>
       <button onclick="submitCustomer()" id="cBtn" style="width:100%; padding:15px; margin-top:10px; background:var(--royal); border:none; color:#fff; border-radius:10px; cursor:pointer;">إرسال التقييم</button>
    </div>

    <div id="alertNotYet" style="display:none; text-align:center;">التوصيل لم يكتمل بعد</div>
    <div id="alertInvalid" style="display:none; text-align:center;">رابط غير صالح</div>
    <div id="dSuccess" style="display:none">✅ تم التوثيق بنجاح</div>
    <div id="cSuccess" style="display:none">✅ شكراً لتقييمك</div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzg8XtXfaUpslYV6ckvgzI41mS6d_OaIeizcIePwsfmgH2uqrrovKg60_ycXL-GkM32/exec';

const io = new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('vis');}),{threshold:.12});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3600);
}

function directUrl(url){
  if(!url)return'';
  if(url.includes('export=view'))return url;
  const m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/)||url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m?`https://drive.google.com/uc?export=view&id=${m[1]}`:url;
}

let _b64=null, _mime='image/jpeg';
function compressImage(input){
  const file=input.files[0]; if(!file)return;
  const stat=document.getElementById('cstat');
  const prev=document.getElementById('preview');
  stat.textContent='⏳ جاري ضغط الصورة…';
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const cvs=document.createElement('canvas');
      let w=img.width, h=img.height, MAX=1024;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      cvs.width=w; cvs.height=h;
      cvs.getContext('2d').drawImage(img,0,0,w,h);
      const url=cvs.toDataURL('image/jpeg',0.7);
      _b64=url.split(',')[1];
      prev.src=url; prev.style.display='block';
      stat.textContent='✅ جاهزة';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function loadPublicData(){
  try {
    const r = await fetch(GAS_URL + '?action=getPublicData');
    const d = await r.json();
    
    document.getElementById('sMosques').textContent = d.stats.mosques;
    document.getElementById('sBoxes').textContent = d.stats.boxes;
    document.getElementById('sBottles').textContent = d.stats.bottles;
    document.getElementById('sRating').textContent = d.stats.rating + ' ★';

    const mg = document.getElementById('mosqueGrid');
    mg.innerHTML = d.mosques.map(m => `<div class="mcard fi">🕌 ${esc(m.name)} - ${m.boxes} كرتون</div>`).join('');

    const rg = document.getElementById('reviewsGrid');
    rg.innerHTML = d.reviews.map(rv => `
      <div class="rcard fi">
        <strong>${esc(rv.display)}</strong> (${rv.stars} ★)
        <p>${esc(rv.comment)}</p>
        ${rv.img ? `<img src="${directUrl(rv.img)}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
      </div>`).join('');

    if(d.images && d.images.length){
      const gg = document.getElementById('galleryGrid');
      gg.innerHTML = d.images.slice(0, 5).map(url => `
        <div class="gi"><img src="${directUrl(url)}" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=Muzn'"></div>`).join('');
    }
    
    document.querySelectorAll('.fi').forEach(el => io.observe(el));
  } catch(err) { console.error(err); }
}

async function initForm(){
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  const userType = params.get('type');
  if(!orderId || !userType) return;

  const r=await fetch(`${GAS_URL}?action=validateToken&id=${orderId}&type=${userType}`);
  const d=await r.json();

  if(!d.valid){
    if(d.reason==='not_delivered_yet') document.getElementById('alertNotYet').style.display='block';
    else document.getElementById('alertInvalid').style.display='block';
    return;
  }

  window._rawId = orderId;
  if(d.entryType==='Driver') document.getElementById('driverForm').style.display='block';
  else document.getElementById('customerForm').style.display='block';
}

async function submitDriver(){
  const name = document.getElementById('dName').value;
  if(!name || !_b64) { alert('يرجى إكمال البيانات'); return; }
  const url = `${GAS_URL}?action=submitDelivery&orderId=${window._rawId}&displayName=${encodeURIComponent(name)}&comment=${encodeURIComponent(document.getElementById('dNote').value)}&imageMime=${_mime}`;
  const r=await fetch(url, { method:'POST', body:_b64 });
  const d=await r.json();
  if(d.success) { document.getElementById('driverForm').innerHTML = '✅ تم التوثيق بنجاح'; loadPublicData(); }
}

async function submitCustomer(){
  const name = document.getElementById('cName').value || 'مساهم';
  const rating = document.getElementById('cRating').value;
  const comment = document.getElementById('cComment').value;
  const url = `${GAS_URL}?action=submitRating&orderId=${window._rawId}&displayName=${encodeURIComponent(name)}&rating=${rating}&comment=${encodeURIComponent(comment)}`;
  const r=await fetch(url, { method:'POST' });
  const d=await r.json();
  if(d.success) { document.getElementById('customerForm').innerHTML = '✅ شكراً لتقييمك'; loadPublicData(); }
}

window.onload = () => { loadPublicData(); initForm(); };
</script>
</body>
</html>
